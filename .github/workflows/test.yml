name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout eaagent
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ====================== 新增：Checkout 私有 Playbook 仓库 ======================
      - name: Checkout Private Playbook Repo
        uses: actions/checkout@v4
        with:
          repository: adoocoke/trading-playbooks
          token: ${{ secrets.PLAYBOOK_REPO_TOKEN }}
          path: artifacts/playbooks
          sparse-checkout: |
            trading_playbook_v3.md
          sparse-checkout-cone-mode: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tushare]"

      - name: Run tests with coverage
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          USE_MOCK_OBSERVATION: "true"   # 推荐开启 Mock，避免 Tushare 限流
        run: |
          python -m pytest \
            --cov=eaagent \
            --cov-branch \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
